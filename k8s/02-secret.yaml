apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-intelligence-secrets
  namespace: ecommerce-intelligence
  labels:
    app: ecommerce-intelligence
    component: secrets
type: Opaque
stringData:
  # These values must be set at deployment time
  # Using stringData for easier manual configuration; convert to base64 data: in production

  # Software Hub / Workshop Credentials
  WXD_HOST: "placeholder-wxd-host.example.com"
  WORKSHOP_USER: "placeholder-user"
  WORKSHOP_PASSWORD: "placeholder-password"
  WORKSHOP_SCHEMA_SUFFIX: "user01"

  # Data Store Endpoints
  CASSANDRA_HOST: "placeholder-cassandra-host.example.com"
  PRESTO_HOST: "placeholder-presto-host.example.com"

  # API Keys (if needed for external services)
  # EXTERNAL_API_KEY: ""

---
# Alternative: Use External Secrets operator or sealed-secrets for production
# This is a base template; replace with actual secret management in production

# Example using kubectl:
# kubectl create secret generic ecommerce-intelligence-secrets \
#   --from-literal=WXD_HOST=$(cat .env | grep WXD_HOST | cut -d= -f2) \
#   --from-literal=WORKSHOP_USER=$(cat .env | grep WORKSHOP_USER | cut -d= -f2) \
#   --from-literal=WORKSHOP_PASSWORD=$(cat .env | grep WORKSHOP_PASSWORD | cut -d= -f2) \
#   --from-literal=CASSANDRA_HOST=$(cat .env | grep CASSANDRA_HOST | cut -d= -f2) \
#   --from-literal=PRESTO_HOST=$(cat .env | grep PRESTO_HOST | cut -d= -f2) \
#   -n ecommerce-intelligence
