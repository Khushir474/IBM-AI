apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-intelligence-api
  namespace: ecommerce-intelligence
  labels:
    app: ecommerce-intelligence
    component: api
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
    # Proxy settings for backend connections
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # Request size limit for large uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  tls:
  - hosts:
    - api.ecommerce-intelligence.example.com
    secretName: ecommerce-intelligence-tls

  rules:
  - host: api.ecommerce-intelligence.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ecommerce-intelligence-api
            port:
              number: 8000
      - path: /health
        pathType: Exact
        backend:
          service:
            name: ecommerce-intelligence-api
            port:
              number: 8000
      - path: /readiness
        pathType: Exact
        backend:
          service:
            name: ecommerce-intelligence-api
            port:
              number: 8000
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: ecommerce-intelligence-api
            port:
              number: 8000
      - path: /docs
        pathType: Exact
        backend:
          service:
            name: ecommerce-intelligence-api
            port:
              number: 8000
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: ecommerce-intelligence-api
            port:
              number: 8000

---
# Network Policy - restrict traffic to API pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ecommerce-intelligence-api-netpol
  namespace: ecommerce-intelligence
  labels:
    app: ecommerce-intelligence
spec:
  podSelector:
    matchLabels:
      app: ecommerce-intelligence
      component: api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from Ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  # Allow from same namespace (metrics, service discovery)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow to external data stores (Cassandra, Presto)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 9042
  # Allow external HTTPS
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
