apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecommerce-intelligence
  namespace: ecommerce-intelligence
  labels:
    app: ecommerce-intelligence

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecommerce-intelligence
  namespace: ecommerce-intelligence
  labels:
    app: ecommerce-intelligence
rules:
# Read ConfigMaps and Secrets
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]

# Read Pods (for service discovery, metrics)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

# Read Services
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]

# (Optional) Leader election for multi-pod coordination
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["ecommerce-intelligence-leader"]
  verbs: ["get", "watch", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecommerce-intelligence
  namespace: ecommerce-intelligence
  labels:
    app: ecommerce-intelligence
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecommerce-intelligence
subjects:
- kind: ServiceAccount
  name: ecommerce-intelligence
  namespace: ecommerce-intelligence
